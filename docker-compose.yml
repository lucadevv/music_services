# Docker Compose - Music Services (FastAPI + YTMusic)
# ===================================================
# Este archivo es para desarrollo individual del servicio.
# Para levantar todo el monorepo, usar el docker-compose.yml de la raíz.
#
# Uso:
#   docker-compose up -d              # Levantar API + Redis
#   docker-compose up -d ytmusic_redis  # Solo Redis
#   docker-compose --profile dev up   # Con hot reload

services:
  # FastAPI - Servicio de YouTube Music
  # IMPORTANTE: El nombre del servicio debe ser "music_services" para que
  # NestJS pueda resolverlo usando http://music_services:8000
  music_services:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: music_app_fastapi
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - BROWSER_ACCOUNTS_DIR=/app/browser
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - RATE_LIMIT_PER_HOUR=${RATE_LIMIT_PER_HOUR:-1000}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_BACKEND=${CACHE_BACKEND:-redis}
      - CACHE_TTL=${CACHE_TTL:-300}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-1000}
      - REDIS_HOST=ytmusic_redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ENABLE_COMPRESSION=${ENABLE_COMPRESSION:-true}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-30}
      - MAX_WORKERS=${MAX_WORKERS:-4}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-music_user}:${POSTGRES_PASSWORD:-music_password}@postgres:5432/${POSTGRES_DB:-music_db}
    volumes:
      - browser_data:/app/browser
    depends_on:
      ytmusic_redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - browser_data:/app/browser
    depends_on:
      ytmusic_redis:
        condition: service_healthy
    networks:
      - music_app_network
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL para API Keys
  postgres:
    image: postgres:15-alpine
    container_name: music_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-music_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-music_password}
      - POSTGRES_DB=${POSTGRES_DB:-music_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - music_app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-music_user} -d ${POSTGRES_DB:-music_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Redis dedicado para YTMusic cache
  ytmusic_redis:
    image: redis:7-alpine
    container_name: ytmusic_redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - ytmusic_redis_data:/data
    networks:
      - music_app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  music_app_network:
    driver: bridge
    name: music_app_network

volumes:
  ytmusic_redis_data:
    driver: local
  browser_data:
    driver: local
  postgres_data:
    driver: local
